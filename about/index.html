<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>關於本站 | 夜鐵文域 RPG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Oxanium:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar panel">
        <div class="brand-block">
          <p class="eyebrow">About</p>
          <h1>關於本站</h1>
          <p class="subtitle">這是一款可部署於 GitHub Pages 的純文字 RPG 範例站。</p>
        </div>
        <a class="btn btn-secondary" href="../">返回主頁</a>
      </header>

      <main class="main-grid">
        <section class="panel view is-visible stack">
          <h2>網站簡介</h2>
          <p>本站以 Vanilla HTML、CSS、JavaScript 製作，主打純文字戰鬥、鍛造與樓層探索。</p>
          <p>遊戲進度使用瀏覽器 LocalStorage 儲存，資料會先做簡易編碼再寫入。</p>
          <p>裝備鍛造採用自訂名稱與玩家識別碼雜湊，讓不同玩家做出來的數值存在差異。</p>
        </section>
      </main>
    </div>
  </body>
</html>
